<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Stations - WIFI Radio</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Edit Radio Stations</h2>

      <div class="catdiv">
        <div class="linetitle">Current Category</div>
        <select id="categoryDropdown" onchange="selectCategory()"></select>

        <button class="button-9 button-danger widthsmall" onclick="deleteCategory()">
          Delete
        </button>
        <button class="button-9 button-success widthsmall" onclick="addCategory()">
          Add New
        </button>
      </div>

      <div class="linetitle">Stations in this Category</div>
      <div id="stationsContainer">
        <!-- Stations will be rendered here -->
      </div>

      <div class="mb-2">
        <button class="button-9" onclick="addStation()">+ Add Station</button>
        <button class="button-9 button-success right" onclick="Save()">SAVE ALL</button>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="button-9 widthsmall" onclick="exportStations()">Export</button>
        <button class="button-9 widthsmall" onclick="importStations()">Import</button>
        <button class="button-9 widthsmall" style="background: #666">
          <a href="./index.html" style="color: white">Back</a>
        </button>
      </div>

      <!-- Search Section -->
      <div class="search-section">
        <div class="linetitle">Find New Stations (radio-browser.info)</div>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="searchInput" class="inpname" style="flex: 1" placeholder="Search by name, tag, or country..." onkeyup="if(event.key==='Enter') searchStations()" />
          <button class="button-9 widthsmall" onclick="searchStations()">Search</button>
        </div>
        <div id="searchResults">
          <!-- Search results will appear here -->
        </div>
      </div>

      <!-- Export/Import Dialogs -->
      <div id="exportdiv">
        <h3>Export Data</h3>
        <p>Copy the text below to backup your stations:</p>
        <div id="pastetextdiv" style="background: white; padding: 10px; border: 1px solid #ccc; border-radius: 4px; max-height: 200px; overflow: auto;"></div>
        <button class="button-9 mt-2" onclick="hideExportStations()">Close</button>
      </div>

      <div id="importdiv">
        <h3>Import Data</h3>
        <p>Paste your station list below:</p>
        <textarea id="inputtextdiv" placeholder="[Category]&#10;Name=URL&#10;..."></textarea>
        <div style="display: flex; gap: 10px;">
          <button class="button-9 button-success" onclick="processInput()">Process & Update</button>
          <button class="button-9" onclick="hideExportStations()">Cancel</button>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
